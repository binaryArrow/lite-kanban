<div
  cdkDropList
  [cdkDropListData]="tickets()"
  class="ticket-container bg-container ml-5 rounded mb-3 flex-1"
  (cdkDropListDropped)="drop($event)">
  <div class="flex sticky top-0 z-10 bg-container mb-2 rounded-t">
    <button class="fa_icon_hover p-2" [matMenuTriggerFor]="menu">
      <fa-icon [icon]="faEllipsisV"/>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="showContainerDeleteConfirmation()" title="Delete this Container">Delete</button>
      <button mat-menu-item (click)="showClearTicketsConfirmation()" title="Delete all tickets inside this Container">
        Clear tickets
      </button>
      <div class="flex">
        <button title="Move the Container to the left" [disabled]="model().order <= 0" mat-menu-item
                (click)="boardService.moveContainer(model())">
          <fa-icon [icon]="faArrowLeft"></fa-icon>
        </button>
        <button title="Move the Container to the right" [disabled]="model().order+1 >= ticketContainers().length"
                mat-menu-item
                (click)="boardService.moveContainer(model(), 'right')">
          <fa-icon [icon]="faArrowRight"></fa-icon>
        </button>
      </div>
    </mat-menu>
    <input (keyup.enter)="modelChanged()" #titleInput
           class="title_input border-b-2 bg-container focus:outline-none border-container-hover2 focus:border-container-hover3"
           (focusout)="modelChanged()" type="text" [(ngModel)]="containerTitle">
  </div>
  <confirmation-dialog
    #deleteContainerDialog
    header="Delete Container?"
    (confirmed)="deleteContainer()">
  </confirmation-dialog>
  <confirmation-dialog
    #deleteImageDialog
    header="Delete Image?"
    (confirmed)="deleteImage()">
  </confirmation-dialog>
  <confirmation-dialog
    #clearTicketsDialog
    header="Clear all tickets?"
    (confirmed)="clearTickets()">
  </confirmation-dialog>
  <div>
    <button class="m-2 hover:bg-container-hover rounded text-center" (click)="addNewTicket()">
      <fa-icon [icon]="faPlus"></fa-icon>
    </button>
    @for (ticket of tickets(); track ticket.id) {
      <ticket (showModalEvent)="showModal($event)" class="ticket-wrapper" [ticketModel]="ticket" cdkDrag></ticket>
    }
  </div>
  <!--  TODO: refactor this into own component -->
  <dialog #ticketModal class="delete-dialog bg-container" (close)="closeTicketModal()"
          (click)="closeDialogWithClickOutside($event, ticketModal)">
    <div class="grid grid-cols-1 w-80 sm:grid-cols-3 sm:w-200">
      <input #ticketTitleInput
             class="ml-3 mb-2 mr-3 border-b-2 bg-container focus:outline-none border-container-hover2 focus:border-container-hover3 col-span-2 text-center"
             spellcheck="false"
             (focusout)="saveTicket()" (keyup.enter)="saveTicket()"
             [ngModel]="openTicketTitle()" (ngModelChange)="openTicketTitle.set($event)">
      <textarea
        class="col-start-1 col-span-2 m-3 col bg-container-hover outline-none rounded p-2 border-b-2 focus:outline-none border-container-hover2
         focus:border-container-hover3 h-80 sm:h-156.25" spellcheck="false"
        [ngModel]="openTicketDescription()" (ngModelChange)="openTicketDescription.set($event)"
        (focusout)="saveTicket()"></textarea>
      <div class="flex flex-col justify-between">
        <div class="p-1">
          <div class="text-start">
            Creation: {{ openTicket()?.createDate }}
          </div>
          <div class="text-start">
            <div>
              <label for="severity">Severity </label>
              <select id="severity" class="mt-5 bg-container-hover hover:cursor-pointer"
                      [ngModel]="openTicketSeverity()" (ngModelChange)="openTicketSeverity.set($event)"
                      (change)="saveTicket()">
                @for (severity of dbService.severities(); track severity) {
                  <option [value]="severity.name">{{ severity.name }}</option>
                }
              </select>
              <button>
                <fa-icon [icon]="faGear" size="sm" class="fa_icon_hover m-2" title="Change Severity Colors"
                         (click)="openSeveritySettings.set(true); ticketModal.close()"></fa-icon>
              </button>
            </div>
          </div>
          <div class="text-center pt-5">
            <label for="image-upload">
              <button class="fa_icon_hover" (click)="triggerImageUpload()" title="Upload Image">
                <fa-icon [icon]="faFileUpload" size="2x"></fa-icon>
              </button>
            </label>
            <input type="file" accept="image/png, image/jpeg, image/jpg" (change)="uploadImage()" multiple
                   id="image-upload" #imageUpload>
          </div>
        </div>
        <div class="flex flex-wrap h-80 overflow-auto">
          @for (image of imageData(); track image.id) {
            <div>
              <button class="ml-2 float-right fa_icon_hover" (click)="showImageDeleteConfirmation(image.id)"
                      title="Delete Image">
                <fa-icon [icon]="faTrash"/>
              </button>
              <img src="{{image.imageURL}}" alt="" height="80px" width="180px" class="image_thumbnail"
                   (click)="openImage(image.imageURL)">
            </div>
          }
        </div>
        <div class="text-right">
          <button class="fa_icon_hover mb-2 mr-2" (click)="showConfirmation.set(true)"
                  title="Delete Ticket">
            <fa-icon [icon]="faTrash"/>
          </button>
        </div>
      </div>
    </div>
    @if (showConfirmation()) {
      <div class="confirm_dialog bg-container-hover absolute bottom-3 right-10">
        Delete Ticket?
        <div>
          <button class="bg-container-hover fa_icon_hover" (click)="deleteTicket()">Yes</button>
          <button class="bg-container-hover fa_icon_hover m-2" (click)="showConfirmation.set(false)">No</button>
        </div>
      </div>
    }
  </dialog>
  <app-severity-settigns [(open)]="openSeveritySettings"></app-severity-settigns>
</div>
