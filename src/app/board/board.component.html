<div class="flex min-h-[75vh] flex-nowrap w-auto items-stretch" cdkDropListGroup>
  @for(container of boardService.containers(); track container.id){
  <ticket-container [model]="container" [ticketContainers]="boardService.containers()"></ticket-container>
  }
  <button data-testid="add-container-btn" class="self-stretch bg-container hover:bg-container-hover rounded p-0.5 ml-5 mr-5 mb-3 text-center" (click)="addNewContainer()">
    <fa-icon [icon]="faPlus"/>
  </button>
</div>
